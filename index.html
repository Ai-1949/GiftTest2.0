<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>天赋发现 · 发现你的超能力</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #0a0a14;
    --surface: #12121f;
    --card: #1a1a2e;
    --accent1: #7c3aed;
    --accent2: #06b6d4;
    --text: #f0f0ff;
    --muted: #7878a0;
    --border: rgba(255,255,255,0.07);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 20%, rgba(124,58,237,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.1) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }

  .orb { position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none; z-index:0; animation:drift 12s ease-in-out infinite alternate; }
  .orb1 { width:300px;height:300px;background:rgba(124,58,237,0.15);top:-100px;left:-100px;animation-delay:0s; }
  .orb2 { width:250px;height:250px;background:rgba(6,182,212,0.12);bottom:-80px;right:-80px;animation-delay:4s; }
  .orb3 { width:200px;height:200px;background:rgba(245,158,11,0.1);top:40%;left:60%;animation-delay:8s; }
  @keyframes drift { from{transform:translate(0,0) scale(1);}to{transform:translate(30px,20px) scale(1.1);} }

  .container {
    position:relative; z-index:1;
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:20px;
  }

  .screen { display:none; width:100%; max-width:680px; }
  .screen.active { display:flex; flex-direction:column; align-items:center; animation:screenIn 0.5s ease; }
  @keyframes screenIn { from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);} }

  /* ── Welcome ── */
  .welcome-badge {
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(124,58,237,0.15); border:1px solid rgba(124,58,237,0.4);
    border-radius:100px; padding:6px 18px;
    font-size:12px; color:#a78bfa; letter-spacing:0.08em; text-transform:uppercase;
    margin-bottom:28px;
  }
  .welcome-badge::before { content:'✦'; font-size:10px; }
  .hero-title {
    font-family:'Syne',sans-serif; font-size:clamp(36px,8vw,64px); font-weight:800;
    text-align:center; line-height:1.1;
    background:linear-gradient(135deg,#fff 0%,#c4b5fd 40%,#67e8f9 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    margin-bottom:20px;
  }
  .hero-sub { font-size:clamp(15px,3vw,18px); color:var(--muted); text-align:center; line-height:1.7; max-width:480px; margin-bottom:48px; }
  .hero-sub span { color:#a78bfa; }
  .talent-chips { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:48px; }
  .chip { display:flex; align-items:center; gap:6px; background:var(--card); border:1px solid var(--border); border-radius:100px; padding:8px 16px; font-size:13px; color:var(--muted); transition:all 0.2s; }
  .chip:hover { border-color:rgba(124,58,237,0.4); color:var(--text); transform:translateY(-2px); }
  .chip .emoji { font-size:16px; }
  .meta-row { display:flex; gap:24px; margin-bottom:40px; flex-wrap:wrap; justify-content:center; }
  .meta-item { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); }
  .meta-item .dot { width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.8);} }

  .btn-primary {
    display:inline-flex; align-items:center; justify-content:center; gap:10px;
    background:linear-gradient(135deg,var(--accent1),#9333ea); color:white;
    border:none; border-radius:16px; padding:18px 48px;
    font-size:17px; font-family:'Noto Sans SC',sans-serif; font-weight:700;
    cursor:pointer; position:relative; overflow:hidden;
    transition:transform 0.2s,box-shadow 0.2s;
    box-shadow:0 0 40px rgba(124,58,237,0.4); letter-spacing:0.03em;
  }
  .btn-primary::before { content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,0.1),transparent);transform:translateX(-100%);transition:transform 0.4s; }
  .btn-primary:hover { transform:translateY(-3px);box-shadow:0 8px 50px rgba(124,58,237,0.5); }
  .btn-primary:hover::before { transform:translateX(100%); }
  .btn-primary:active { transform:translateY(-1px); }

  /* ── Quiz Header ── */
  .quiz-header { width:100%; margin-bottom:28px; }
  .quiz-header-top { display:flex; align-items:center; gap:12px; margin-bottom:14px; }

  /* ── Back button – bigger & more prominent ── */
  .btn-back {
    display:flex; align-items:center; justify-content:center; gap:6px;
    height:40px; padding:0 16px;
    border-radius:100px;
    background:rgba(124,58,237,0.18);
    border:1.5px solid rgba(124,58,237,0.5);
    color:#c4b5fd;
    cursor:pointer; font-size:14px; font-weight:600;
    font-family:'Noto Sans SC',sans-serif;
    transition:all 0.2s; flex-shrink:0; white-space:nowrap;
    letter-spacing:0.02em;
  }
  .btn-back .back-arrow { font-size:16px; line-height:1; }
  .btn-back:hover {
    background:rgba(124,58,237,0.32);
    border-color:rgba(124,58,237,0.8);
    color:#e9d5ff;
    transform:translateX(-2px);
    box-shadow:0 0 16px rgba(124,58,237,0.35);
  }
  .btn-back:disabled { opacity:0.22; cursor:not-allowed; pointer-events:none; }

  /* Question counter badge */
  .q-badge {
    display:flex; align-items:baseline; gap:4px;
    background:rgba(124,58,237,0.15); border:1px solid rgba(124,58,237,0.35);
    border-radius:100px; padding:5px 14px; flex-shrink:0;
  }
  .q-badge-num { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:#c4b5fd; line-height:1; }
  .q-badge-sep { font-size:13px; color:var(--muted); }
  .q-badge-total { font-size:13px; color:var(--muted); font-weight:500; }

  /* Step dots */
  .step-dots { display:flex; align-items:center; gap:4px; flex:1; overflow:hidden; }
  .step-dot { height:6px; border-radius:100px; background:rgba(255,255,255,0.08); transition:all 0.35s cubic-bezier(0.4,0,0.2,1); flex:1; min-width:4px; max-width:26px; }
  .step-dot.done { background:linear-gradient(90deg,var(--accent1),#9333ea); box-shadow:0 0 6px rgba(124,58,237,0.5); }
  .step-dot.current { background:linear-gradient(90deg,var(--accent2),var(--accent1)); box-shadow:0 0 10px rgba(6,182,212,0.6); max-width:36px; animation:dotPulse 1.4s ease-in-out infinite; }
  @keyframes dotPulse { 0%,100%{box-shadow:0 0 10px rgba(6,182,212,0.6);}50%{box-shadow:0 0 18px rgba(6,182,212,0.9);} }

  .progress-wrap { width:100%; height:3px; background:rgba(255,255,255,0.06); border-radius:100px; overflow:hidden; margin-top:10px; }
  .progress-bar { height:100%; background:linear-gradient(90deg,var(--accent1),var(--accent2)); border-radius:100px; transition:width 0.5s cubic-bezier(0.4,0,0.2,1); box-shadow:0 0 10px rgba(124,58,237,0.5); }

  /* ── Question ── */
  .question-card { width:100%; background:var(--card); border:1px solid var(--border); border-radius:24px; padding:clamp(24px,5vw,40px); margin-bottom:20px; position:relative; overflow:hidden; }
  .question-card::before { content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent1),var(--accent2)); }
  .q-icon { font-size:36px; margin-bottom:16px; display:block; animation:bounce 2s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);} }
  .q-text { font-size:clamp(16px,3.5vw,20px); font-weight:500; line-height:1.6; color:var(--text); }

  .options-grid { width:100%; display:grid; gap:12px; }
  .option-btn { display:flex; align-items:center; gap:14px; background:var(--surface); border:1.5px solid var(--border); border-radius:16px; padding:16px 20px; cursor:pointer; text-align:left; transition:all 0.2s; color:var(--text); font-size:clamp(13px,2.5vw,15px); font-family:'Noto Sans SC',sans-serif; line-height:1.5; position:relative; overflow:hidden; }
  .option-letter { min-width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);transition:all 0.2s;flex-shrink:0; }
  .option-btn:hover { border-color:rgba(124,58,237,0.5);background:rgba(124,58,237,0.08);transform:translateX(4px); }
  .option-btn:hover .option-letter { background:var(--accent1);border-color:var(--accent1);color:white; }
  .option-btn.selected { border-color:var(--accent1);background:rgba(124,58,237,0.15);box-shadow:0 0 20px rgba(124,58,237,0.2); }
  .option-btn.selected .option-letter { background:var(--accent1);border-color:var(--accent1);color:white; }

  /* ── Result ── */
  .result-hero { text-align:center; margin-bottom:32px; width:100%; }
  .result-crown { font-size:64px; display:block; margin-bottom:16px; animation:crownPop 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes crownPop { from{transform:scale(0) rotate(-15deg);opacity:0;}to{transform:scale(1) rotate(0deg);opacity:1;} }
  .result-label { font-size:12px; text-transform:uppercase; letter-spacing:0.15em; color:var(--muted); margin-bottom:10px; }
  .result-type { font-family:'Syne',sans-serif; font-size:clamp(28px,6vw,48px); font-weight:800; background:linear-gradient(135deg,#fff,#c4b5fd,#67e8f9); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:12px; }
  .result-tagline { font-size:15px; color:var(--muted); line-height:1.7; max-width:420px; margin:0 auto; }

  /* ── Top 3 cards – fixed layout, no orphan ── */
  .top-talents {
    width:100%;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
    margin-bottom:20px;
  }
  .talent-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:22px 16px; text-align:center; position:relative; overflow:hidden; transition:transform 0.2s,box-shadow 0.2s; animation:cardRise 0.6s ease both; }
  .talent-card:nth-child(2){animation-delay:0.1s;} .talent-card:nth-child(3){animation-delay:0.2s;}
  @keyframes cardRise { from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);} }
  .talent-card:hover { transform:translateY(-4px); box-shadow:0 12px 40px rgba(124,58,237,0.2); }
  .talent-card.first { border-color:rgba(124,58,237,0.4); background:linear-gradient(135deg,rgba(124,58,237,0.1),rgba(6,182,212,0.05)); }
  .talent-card.first::after { content:'🥇'; position:absolute; top:8px; right:10px; font-size:14px; }
  .talent-card.second::after { content:'🥈'; position:absolute; top:8px; right:10px; font-size:14px; }
  .talent-card.third::after { content:'🥉'; position:absolute; top:8px; right:10px; font-size:14px; }
  .tc-icon { font-size:32px; margin-bottom:8px; display:block; }
  .tc-name { font-size:14px; font-weight:600; color:var(--text); margin-bottom:5px; }
  .tc-desc { font-size:11px; color:var(--muted); line-height:1.5; }

  /* ── Score bars ── */
  .scores-section { width:100%; background:var(--card); border:1px solid var(--border); border-radius:24px; padding:clamp(20px,4vw,32px); margin-bottom:20px; }
  .scores-title { font-size:13px; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:18px; }
  .score-row { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .score-row:last-child { margin-bottom:0; }
  .score-label { display:flex; align-items:center; gap:7px; min-width:120px; font-size:13px; color:var(--text); }
  .score-label .s-icon { font-size:15px; }
  .score-bar-wrap { flex:1; height:8px; background:rgba(255,255,255,0.06); border-radius:100px; overflow:hidden; }
  .score-bar-fill { height:100%; border-radius:100px; transition:width 1s cubic-bezier(0.4,0,0.2,1); width:0; }
  .score-pct { font-size:12px; color:var(--muted); min-width:34px; text-align:right; }

  /* ── Desc cards ── */
  .desc-section { width:100%; margin-bottom:24px; }
  .desc-section-title { font-size:13px; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:14px; padding-left:4px; }
  .desc-cards { display:grid; gap:12px; }
  .desc-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:20px 22px; display:flex; gap:16px; align-items:flex-start; transition:transform 0.2s,border-color 0.2s; animation:cardRise 0.5s ease both; }
  .desc-card:nth-child(2){animation-delay:0.08s;} .desc-card:nth-child(3){animation-delay:0.16s;} .desc-card:nth-child(4){animation-delay:0.24s;}
  .desc-card:hover { transform:translateY(-2px); border-color:rgba(124,58,237,0.22); }
  .desc-card-icon { width:44px; height:44px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
  .desc-card.identity .desc-card-icon { background:rgba(124,58,237,0.15); }
  .desc-card.strength .desc-card-icon { background:rgba(6,182,212,0.12); }
  .desc-card.career   .desc-card-icon { background:rgba(245,158,11,0.12); }
  .desc-card.advice   .desc-card-icon { background:rgba(16,185,129,0.12); }
  .desc-card-body { flex:1; min-width:0; }
  .desc-card-label { font-size:11px; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:5px; }
  .desc-card-content { font-size:14px; color:#d0d0f0; line-height:1.8; }
  .desc-card-content strong { color:var(--text); font-weight:600; }
  .career-pills { display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; }
  .career-pill { background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.25); color:#fcd34d; border-radius:100px; padding:4px 12px; font-size:12px; font-weight:500; }

  /* ── Share nudge (not a button) ── */
  .share-nudge {
    width:100%;
    margin-top:4px;
    margin-bottom:16px;
    border-radius:20px;
    background: linear-gradient(135deg, rgba(16,185,129,0.08), rgba(6,182,212,0.06));
    border:1px solid rgba(16,185,129,0.2);
    padding:20px 24px;
    display:flex;
    align-items:flex-start;
    gap:14px;
  }
  .share-nudge-emoji { font-size:28px; flex-shrink:0; margin-top:2px; }
  .share-nudge-body { flex:1; }
  .share-nudge-title { font-size:15px; font-weight:600; color:#6ee7b7; margin-bottom:6px; }
  .share-nudge-text { font-size:13px; color:var(--muted); line-height:1.75; }
  .share-nudge-text span { color:#a7f3d0; }
  .share-nudge-link {
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-top:16px; width:100%;
    background:linear-gradient(135deg,#059669,#10b981);
    border:none; border-radius:14px; padding:14px 20px;
    font-size:15px; font-weight:700; color:white;
    cursor:pointer; transition:all 0.2s;
    font-family:'Noto Sans SC',sans-serif;
    box-shadow:0 0 28px rgba(16,185,129,0.35);
    position:relative; overflow:hidden;
    letter-spacing:0.02em;
  }
  .share-nudge-link::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,transparent,rgba(255,255,255,0.08),transparent); transform:translateX(-100%); transition:transform 0.4s; }
  .share-nudge-link:hover { transform:translateY(-2px); box-shadow:0 6px 36px rgba(16,185,129,0.5); }
  .share-nudge-link:hover::before { transform:translateX(100%); }
  .share-nudge-link:active { transform:translateY(0); }

  /* ── Result bottom actions ── */
  .result-actions {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    width:100%;
    margin-top:4px;
    margin-bottom:24px;
  }
  .btn-save {
    display:flex; align-items:center; justify-content:center; gap:8px;
    background:var(--card);
    border:1.5px solid rgba(124,58,237,0.35);
    border-radius:14px; padding:14px 16px;
    font-size:14px; font-weight:600; color:#c4b5fd;
    font-family:'Noto Sans SC',sans-serif;
    cursor:pointer; transition:all 0.2s;
    letter-spacing:0.02em;
  }
  .btn-save:hover { background:rgba(124,58,237,0.12); border-color:rgba(124,58,237,0.6); color:#e9d5ff; transform:translateY(-2px); box-shadow:0 4px 20px rgba(124,58,237,0.2); }
  .btn-save:active { transform:translateY(0); }
  .btn-retry {
    display:flex; align-items:center; justify-content:center; gap:8px;
    background:transparent;
    border:1.5px solid var(--border);
    border-radius:14px; padding:14px 16px;
    font-size:14px; font-weight:500; color:var(--muted);
    font-family:'Noto Sans SC',sans-serif;
    cursor:pointer; transition:all 0.2s;
  }
  .btn-retry:hover { border-color:rgba(255,255,255,0.18); color:var(--text); transform:translateY(-2px); }
  .btn-retry:active { transform:translateY(0); }

  /* Stars / confetti / toast */
  .stars { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .star { position:absolute; width:2px; height:2px; background:white; border-radius:50%; opacity:0; animation:twinkle var(--dur) ease-in-out infinite var(--delay); }
  @keyframes twinkle { 0%,100%{opacity:0;transform:scale(1);}50%{opacity:var(--op);transform:scale(1.5);} }
  .confetti-piece { position:fixed; width:8px; height:8px; top:-10px; border-radius:2px; animation:confettiFall linear forwards; z-index:100; pointer-events:none; }
  @keyframes confettiFall { 0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;} }
  .toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--card); border:1px solid rgba(16,185,129,0.4); color:#10b981; padding:14px 24px; border-radius:100px; font-size:14px; font-weight:500; z-index:9999; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1); white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }

  .q-out { animation:qOut 0.22s ease forwards; }
  @keyframes qOut { to{opacity:0;transform:translateX(-28px);} }
  .q-in { animation:qIn 0.3s ease both; }
  @keyframes qIn { from{opacity:0;transform:translateX(28px);}to{opacity:1;transform:translateX(0);} }
  .q-back-out { animation:qBackOut 0.22s ease forwards; }
  @keyframes qBackOut { to{opacity:0;transform:translateX(28px);} }
  .q-back-in { animation:qBackIn 0.3s ease both; }
  @keyframes qBackIn { from{opacity:0;transform:translateX(-28px);}to{opacity:1;transform:translateX(0);} }

  @media(max-width:520px) {
    .container { padding:14px; }
    .score-label { min-width:95px; font-size:12px; }
    .meta-row { gap:12px; }
    .top-talents { grid-template-columns:repeat(3,1fr); gap:10px; }
    .talent-card { padding:16px 10px; }
    .tc-icon { font-size:26px; }
    .tc-name { font-size:12px; }
    .tc-desc { display:none; }
    .desc-card { padding:16px 14px; gap:12px; }
    .desc-card-icon { width:38px; height:38px; font-size:18px; border-radius:10px; }
    .btn-back { padding:0 12px; font-size:13px; }
    .share-nudge { padding:16px 18px; gap:12px; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="toast" id="toast"></div>

<div class="container">

  <!-- Welcome -->
  <div class="screen active" id="screen-welcome">
    <div class="welcome-badge">免费 · 5分钟 · 科学测评</div>
    <h1 class="hero-title">发现你的<br>天赋超能力</h1>
    <p class="hero-sub">基于<span>多元智能理论</span>与<span>优势心理学</span>，<br>15道题揭示你独特的天赋密码</p>
    <div class="talent-chips">
      <div class="chip"><span class="emoji">🧠</span>逻辑分析</div>
      <div class="chip"><span class="emoji">🎨</span>艺术创造</div>

const sfx = (() => {
  let ctx = null;
  const init = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); return ctx; };

  function play(freq, vol, atk, dec, type, freqEnd) {
    try {
      const c = init();
      const osc = c.createOscillator();
      const g = c.createGain();
      const now = c.currentTime;
      osc.connect(g); g.connect(c.destination);
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, now);
      if (freqEnd) osc.frequency.linearRampToValueAtTime(freqEnd, now + atk + dec);
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(vol, now + atk);
      g.gain.exponentialRampToValueAtTime(0.0001, now + atk + dec);
      osc.start(now); osc.stop(now + atk + dec + 0.05);
    } catch(e) {}
  }

  return {
    // Soft tick when selecting an option
    tap()     { play(480, 0.15, 0.007, 0.10); play(720, 0.06, 0.007, 0.07); },
    // Gentle forward whoosh when advancing
    next()    { play(300, 0.10, 0.01, 0.18, 'sine', 580); },
    // Downward swoop when going back
    back()    { play(520, 0.09, 0.01, 0.18, 'sine', 260); },
    // Warm celebration chord on result
    celebrate() {
      [[523,0],[659,60],[784,120],[1047,180]].forEach(([f,d]) => {
        setTimeout(() => play(f, 0.11, 0.01, 0.85), d);
        setTimeout(() => play(f*1.005, 0.04, 0.01, 0.60), d + 15);
      });
    },
    // Copy/share click
    share()   { play(600, 0.10, 0.007, 0.12); play(900, 0.05, 0.012, 0.10); },
    // Save click – slightly lower, "done" feel
    save()    { play(420, 0.10, 0.007, 0.10); play(630, 0.05, 0.010, 0.09); },
    // Start button
    start()   { [330,415,523].forEach((f,i)=>setTimeout(()=>play(f,0.10,0.01,0.18),i*55)); },
  };
})();

// ── DOTS ─────────────────────────────────────────────────────
function renderDots() {
  const c = document.getElementById('step-dots');
  c.innerHTML = '';
  QUESTIONS.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'step-dot' + (i<currentQ?' done':i===currentQ?' current':'');
    c.appendChild(d);
  });
}

// ── QUIZ ─────────────────────────────────────────────────────
function startQuiz() {
  sfx.start();
  initScores(); currentQ=0; answers=[];
  showScreen('quiz'); renderQuestion('in');
}

function renderQuestion(dir) {
  const q = QUESTIONS[currentQ];
  document.getElementById('q-current').textContent = currentQ+1;
  document.getElementById('q-total').textContent = QUESTIONS.length;
  document.getElementById('progress-bar').style.width = (currentQ/QUESTIONS.length*100)+'%';
  document.getElementById('btn-back').disabled = currentQ===0;
  renderDots();

  const anim = dir==='back'?'q-back-in':'q-in';
  document.getElementById('question-card').className = 'question-card '+anim;
  document.getElementById('options-grid').className = 'options-grid '+anim;
  document.getElementById('q-icon').textContent = q.icon;
  document.getElementById('q-text').textContent = q.text;

  const grid = document.getElementById('options-grid');
  grid.innerHTML='';
  ['A','B','C','D'].forEach((letter,i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn'+(answers[currentQ]===i?' selected':'');
    btn.innerHTML = `<span class="option-letter">${letter}</span><span>${q.options[i].text}</span>`;
    btn.onclick = () => selectOption(btn, q.options[i], i);
    grid.appendChild(btn);
  });
}

function selectOption(btn, opt, idx) {
  document.querySelectorAll('.option-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  answers[currentQ] = idx;
  sfx.tap();

  setTimeout(() => {
    sfx.next();
    if (opt.scores) Object.entries(opt.scores).forEach(([k,v])=>scores[k]=(scores[k]||0)+v);

    const card=document.getElementById('question-card');
    const grid=document.getElementById('options-grid');
    card.className='question-card q-out'; grid.className='options-grid q-out';

    setTimeout(()=>{
      currentQ++;
      if (currentQ>=QUESTIONS.length) showResults();
      else renderQuestion('in');
    },230);
  },450);
}

function goBack() {
  if (currentQ===0) return;
  sfx.back();
  const prev = currentQ-1;
  const prevChoice = answers[prev];
  if (prevChoice!==undefined) {
    const prevOpt = QUESTIONS[prev].options[prevChoice];
    if (prevOpt.scores) Object.entries(prevOpt.scores).forEach(([k,v])=>scores[k]=Math.max(0,(scores[k]||0)-v));
    answers[prev]=undefined;
  }

  const card=document.getElementById('question-card');
  const grid=document.getElementById('options-grid');
  card.className='question-card q-back-out'; grid.className='options-grid q-back-out';

  setTimeout(()=>{ currentQ--; renderQuestion('back'); },220);
}

// ── RESULTS ──────────────────────────────────────────────────
function showResults() {
  document.getElementById('progress-bar').style.width='100%';

  const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const topKey = sorted[0][0];
  const profile = PROFILES[topKey];

  document.getElementById('result-icon').textContent = profile.icon;
  document.getElementById('result-type').textContent = profile.title;
  document.getElementById('result-tagline').textContent = profile.tagline;

  // Top 3 – always 3 columns, no orphan
  const medals = ['first','second','third'];
  const topDiv = document.getElementById('top-talents');
  topDiv.innerHTML='';
  sorted.slice(0,3).forEach(([key],i)=>{
    const t=TALENTS[key];
    const el=document.createElement('div');
    el.className='talent-card '+medals[i];
    el.innerHTML=`<span class="tc-icon">${t.icon}</span><div class="tc-name">${t.name}</div><div class="tc-desc">${SHORT_DESC[key]}</div>`;
    topDiv.appendChild(el);
  });

  // Score bars
  const maxScore=sorted[0][1]||1;
  const scEl=document.getElementById('scores-container');
  scEl.innerHTML='';
  sorted.forEach(([key,score])=>{
    const t=TALENTS[key];
    const pct=Math.max(Math.round((score/(maxScore+2))*100),5);
    const row=document.createElement('div'); row.className='score-row';
    row.innerHTML=`<div class="score-label"><span class="s-icon">${t.icon}</span>${t.name}</div><div class="score-bar-wrap"><div class="score-bar-fill" data-pct="${pct}" style="background:${t.gradient}"></div></div><div class="score-pct">${pct}%</div>`;
    scEl.appendChild(row);
  });

  // Desc cards
  const dc=document.getElementById('desc-cards');
  dc.innerHTML='';
  [
    {type:'identity',icon:profile.icon,label:'你是谁',content:profile.identity},
    {type:'strength',icon:'⚡',label:'核心优势',content:profile.strength},
    {type:'career',icon:'🚀',label:'适合方向',content:'你的天赋在这些领域能产生最大价值：',pills:profile.careers},
    {type:'advice',icon:'✨',label:'成长建议',content:profile.advice},
  ].forEach((c,i)=>{
    const el=document.createElement('div');
    el.className=`desc-card ${c.type}`;
    el.style.animationDelay=(i*0.08)+'s';
    const pillsHTML=c.pills?`<div class="career-pills">${c.pills.map(p=>`<span class="career-pill">${p}</span>`).join('')}</div>`:'';
    el.innerHTML=`<div class="desc-card-icon">${c.icon}</div><div class="desc-card-body"><div class="desc-card-label">${c.label}</div><div class="desc-card-content">${c.content}${pillsHTML}</div></div>`;
    dc.appendChild(el);
  });

  showScreen('result');
  launchConfetti();
  sfx.celebrate();
  setTimeout(()=>document.querySelectorAll('.score-bar-fill').forEach(b=>b.style.width=b.dataset.pct+'%'),150);
}

// ── CONFETTI ─────────────────────────────────────────────────
function launchConfetti() {
  const colors=['#7c3aed','#06b6d4','#f59e0b','#10b981','#f43f5e','#8b5cf6','#ec4899'];
  for(let i=0;i<60;i++) setTimeout(()=>{
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;background:${colors[~~(Math.random()*colors.length)]};width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*.5}s;`;
    document.body.appendChild(p); setTimeout(()=>p.remove(),5500);
  },i*30);
}

// ── SHARE ────────────────────────────────────────────────────
function shareResult() {
  const type=document.getElementById('result-type').textContent;
  const tagline=document.getElementById('result-tagline').textContent;
  const text=`🌟 我在"天赋发现"测试中的结果是：${type}！\n"${tagline}"\n\n快来发现你的天赋超能力吧～`;
  if (navigator.share) { navigator.share({title:'我的天赋类型',text}).catch(()=>{}); }
  else if (navigator.clipboard) { navigator.clipboard.writeText(text).then(()=>showToast('✓ 已复制，快去分享给朋友！')); }
  else { showToast('✓ 快截图分享给好友吧！'); }
}

function saveResult() {
  sfx.save();
  const type = document.getElementById('result-type').textContent;
  const tagline = document.getElementById('result-tagline').textContent;

  // Build a clean text card
  const sorted = Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const top3 = sorted.slice(0,3).map(([k])=>TALENTS[k].name).join(' · ');
  const lines = [
    '═══════════════════════════',
    '  🌟 我的天赋发现报告',
    '═══════════════════════════',
    '',
    `主导天赋：${type}`,
    `"${tagline}"`,
    '',
    `天赋TOP 3：${top3}`,
    '',
    '── 各维度天赋指数 ──',
    ...sorted.map(([k,v])=>{
      const pct = Math.max(Math.round((v/(sorted[0][1]+2))*100),5);
      const bar = '█'.repeat(Math.round(pct/10))+'░'.repeat(10-Math.round(pct/10));
      return `${TALENTS[k].icon} ${TALENTS[k].name.padEnd(5,'　')} ${bar} ${pct}%`;
    }),
    '',
    '═══════════════════════════',
    `保存于 ${new Date().toLocaleDateString('zh-CN')}`,
  ];
  const content = lines.join('\n');

  // Try to download as .txt file
  try {
    const blob = new Blob([content], {type:'text/plain;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `天赋报告_${type}.txt`;
    a.click();
    URL.revokeObjectURL(a.href);
    showToast('✓ 结果已保存到本地！');
  } catch(e) {
    // Fallback: copy to clipboard
    if (navigator.clipboard) {
      navigator.clipboard.writeText(content).then(()=>showToast('✓ 已复制，可粘贴保存！'));
    } else {
      showToast('✓ 快截图保存吧！');
    }
  }
}

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
